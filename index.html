<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro - utileria.js</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="contenedor-formulario">
        <h1>Formulario de Registro</h1>
        <p class="subtitulo">Cada campo se valida usando una función de utileria.js</p>

        <form id="formRegistro">

            <div class="grupo-formulario" id="grupoNombre">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ej: Maria Jose Perez">
                <p class="pista">Vista previa: <span id="previewNombre">-</span></p>
                <p class="mensaje-error" id="errorNombre"></p>
            </div>

            <div class="grupo-formulario" id="grupoCorreo">
                <label for="correo">Correo electrónico</label>
                <input type="text" id="correo" placeholder="ejemplo@correo.com">
                <p class="mensaje-error" id="errorCorreo"></p>
            </div>

            <div class="grupo-formulario" id="grupoTelefono">
                <label for="telefono">Teléfono (máximo 10 dígitos)</label>
                <input type="text" id="telefono" placeholder="Ej: 9511234567">
                <p class="mensaje-error" id="errorTelefono"></p>
            </div>

            <div class="grupo-formulario">
                <label for="fecha">Fecha de nacimiento</label>
                <input type="date" id="fecha">
                <button type="button" id="btnVerEdad" class="boton-secundario">Ver mi edad</button>
            </div>

            <div class="grupo-formulario" id="grupoPassword">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres">
                <p class="pista">Fuerza de la contraseña: <span id="fuerzaPassword">-</span></p>
                <p class="mensaje-error" id="errorPassword"></p>
            </div>

            <button type="submit" class="boton-convertir">Registrarme</button>

            <p id="mensajeFinal"></p>
        </form>
    </div>

    <p class="pie-pagina">¿Ya tienes cuenta? <a href="login.html">Ir a login.html</a></p>

  
    <div class="fondo-modal" id="modalEdad">
        <div class="caja-modal">
            <h2>Tu edad es:</h2>
            <div class="edad-resultado" id="resultadoEdad">--</div>
            <div class="edad-detalle" id="detalleEdad">Ingresa tu fecha de nacimiento</div>
            <button type="button" id="btnCerrarModal" class="boton-secundario">Cerrar</button>
        </div>
    </div>

    <script src="js/utileria.js"></script>
    <script>

        const campoNombre = document.getElementById("nombre");
        const campoCorreo = document.getElementById("correo");
        const campoTelefono = document.getElementById("telefono");
        const campoFecha = document.getElementById("fecha");
        const campoPassword = document.getElementById("password");

        const previewNombre = document.getElementById("previewNombre");
        const fuerzaPassword = document.getElementById("fuerzaPassword");
        const mensajeFinal = document.getElementById("mensajeFinal");

        const modalEdad = document.getElementById("modalEdad");
        const resultadoEdad = document.getElementById("resultadoEdad");
        const detalleEdad = document.getElementById("detalleEdad");

   
        campoNombre.addEventListener("input", function () {
            if (campoNombre.value.trim() === "") {
                previewNombre.textContent = "-";
            } else {
                previewNombre.textContent = capitalizarPalabras(campoNombre.value);
            }
            console.log("soloLetras('" + campoNombre.value + "'):", soloLetras(campoNombre.value));
        });

        campoCorreo.addEventListener("input", function () {
            console.log("validarCorreo('" + campoCorreo.value + "'):", validarCorreo(campoCorreo.value));
        });

        campoTelefono.addEventListener("input", function () {
            console.log("validarLongitud('" + campoTelefono.value + "', 10):", validarLongitud(campoTelefono.value, 10));
        });

        campoPassword.addEventListener("input", function () {
            if (campoPassword.value === "") {
                fuerzaPassword.textContent = "-";
            } else {
                fuerzaPassword.textContent = calcularFuerzaPassword(campoPassword.value);
            }
            console.log("validarPassword:", validarPassword(campoPassword.value), "| fuerza:", calcularFuerzaPassword(campoPassword.value));
        });

        document.getElementById("btnVerEdad").addEventListener("click", function () {
            if (campoFecha.value === "") {
                resultadoEdad.textContent = "--";
                detalleEdad.textContent = "Ingresa tu fecha de nacimiento primero.";
            } else {
                const edad = calcularEdad(campoFecha.value);
                const mayorDeEdad = esMayorDeEdad(campoFecha.value);

                resultadoEdad.textContent = edad;
                detalleEdad.textContent = mayorDeEdad
                    ? "Eres mayor de edad."
                    : "Eres menor de edad.";
            }
            modalEdad.classList.add("mostrar");
        });

        document.getElementById("btnCerrarModal").addEventListener("click", function () {
            modalEdad.classList.remove("mostrar");
        });

        document.getElementById("formRegistro").addEventListener("submit", function (evento) {
            evento.preventDefault();

            const nombreValido = soloLetras(campoNombre.value);
            const correoValido = validarCorreo(campoCorreo.value);
            const telefonoValido = validarLongitud(campoTelefono.value, 10);
            const passwordValida = validarPassword(campoPassword.value);

            document.getElementById("errorNombre").textContent = nombreValido ? "" : "Solo se permiten letras y espacios.";
            document.getElementById("errorCorreo").textContent = correoValido ? "" : "El correo no tiene un formato válido.";
            document.getElementById("errorTelefono").textContent = telefonoValido ? "" : "El teléfono debe tener 10 dígitos o menos.";
            document.getElementById("errorPassword").textContent = passwordValida ? "" : "Debe tener 8+ caracteres, mayúscula, minúscula, número y carácter especial.";

            if (nombreValido && correoValido && telefonoValido && passwordValida) {
                mensajeFinal.className = "mensaje-exito";
                mensajeFinal.textContent = "Registro válido. Todos los campos pasaron las validaciones.";
            } else {
                mensajeFinal.className = "mensaje-error";
                mensajeFinal.textContent = "Revisa los campos marcados en rojo.";
            }
        });

    </script>

</body>
</html>
